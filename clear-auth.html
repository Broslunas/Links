<!DOCTYPE html>
<html>
<head>
    <title>Limpiar Datos de Autenticación</title>
</head>
<body>
    <h1>Limpiar Datos de Autenticación</h1>
    <button onclick="clearAuth()">Limpiar Cookies y LocalStorage</button>
    <div id="result"></div>

    <script>
        function clearAuth() {
            // Clear all cookies
            document.cookie.split(";").forEach(function(c) { 
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
            });
            
            // Clear localStorage
            localStorage.clear();
            
            // Clear sessionStorage
            sessionStorage.clear();
            
            document.getElementById('result').innerHTML = '<p style="color: green;">✅ Datos de autenticación limpiados. Recarga la página y prueba de nuevo.</p>';
        }
    </script>
</body>
</html>
